name: iOS

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync ios

      # Capacitor 8 uses Swift Package Manager — no CocoaPods needed.
      # SPM dependencies are resolved automatically by xcodebuild.
      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Resolve SPM dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -derivedDataPath ios/App/build

      - name: Build for simulator (unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath ios/App/build \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Zip simulator build
        run: |
          cd ios/App/build/Build/Products/Debug-iphonesimulator
          zip -r App-simulator.zip App.app

      - name: Upload simulator build
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-${{ github.sha }}
          path: ios/App/build/Build/Products/Debug-iphonesimulator/App-simulator.zip
          retention-days: 30

      - name: Publish simulator build to nightly release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly Build"
          prerelease: true
          make_latest: false
          body: |
            Automated debug build from the latest commit on `main`.
            Updated on every push — not for production use.
          files: ios/App/build/Build/Products/Debug-iphonesimulator/App-simulator.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Signed IPA for real device / TestFlight (only on version tags) ─
      # Required secrets:
      #   IOS_CERTIFICATE_BASE64       base64-encoded .p12 distribution certificate
      #   IOS_CERTIFICATE_PASSWORD     .p12 password
      #   IOS_PROVISIONING_PROFILE     base64-encoded .mobileprovision
      #   IOS_TEAM_ID                  Apple Team ID (e.g. ABCD1234EF)
      - name: Import certificate & provisioning profile
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db

          echo -n "$IOS_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
          echo -n "$IOS_PROVISIONING_PROFILE" | base64 --decode -o "$PP_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build signed archive
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -o pipefail
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ios/App/build/App.xcarchive \
            DEVELOPMENT_TEAM=${{ secrets.IOS_TEAM_ID }} \
            archive \
            | xcpretty

      - name: Export IPA
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cat > /tmp/export-options.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>${{ secrets.IOS_TEAM_ID }}</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath ios/App/build/App.xcarchive \
            -exportPath ios/App/build/ipa \
            -exportOptionsPlist /tmp/export-options.plist \
            | xcpretty

      - name: Upload IPA
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ github.ref_name }}
          path: ios/App/build/ipa/*.ipa
          retention-days: 90

      - name: Publish IPA to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ios/App/build/ipa/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
