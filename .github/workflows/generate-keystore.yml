name: Generate Release Keystore

on:
  workflow_dispatch:
    inputs:
      backup_passphrase:
        description: "Passphrase to encrypt your keystore backup — save this in your password manager"
        required: true

jobs:
  generate:
    name: Generate & store keystore
    runs-on: ubuntu-latest

    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Generate keystore and set secrets
        env:
          GH_TOKEN: ${{ secrets.KEYSTORE_SETUP_PAT }}
          BACKUP_PASS: ${{ inputs.backup_passphrase }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          ALIAS="intake-tracker"
          STORE_PASS=$(openssl rand -hex 20)
          KEY_PASS="$STORE_PASS"  # PKCS12 requires store and key password to match

          keytool -genkey -v \
            -keystore release.jks \
            -alias "$ALIAS" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$STORE_PASS" \
            -keypass  "$KEY_PASS" \
            -dname "CN=Intake Tracker, O=App, L=Unknown, ST=Unknown, C=US"

          # Write base64 to a file — avoids any shell variable/pipe whitespace issues
          base64 -w 0 release.jks > keystore.b64

          # Write secrets into the repo
          gh secret set ANDROID_KEYSTORE_BASE64 -R "$REPO" < keystore.b64
          printf '%s' "$ALIAS"      | gh secret set ANDROID_KEY_ALIAS        -R "$REPO"
          printf '%s' "$KEY_PASS"   | gh secret set ANDROID_KEY_PASSWORD     -R "$REPO"
          printf '%s' "$STORE_PASS" | gh secret set ANDROID_STORE_PASSWORD   -R "$REPO"

          B64=$(cat keystore.b64)
          shred -u keystore.b64

          echo "✓ All 4 Android signing secrets set successfully"

          # Encrypt the backup so the artifact is safe even if the repo is public
          printf 'ANDROID_KEY_ALIAS=%s\nANDROID_KEY_PASSWORD=%s\nANDROID_STORE_PASSWORD=%s\nANDROID_KEYSTORE_BASE64=%s\n' \
            "$ALIAS" "$KEY_PASS" "$STORE_PASS" "$B64" \
            | openssl enc -aes-256-cbc -pbkdf2 -pass env:BACKUP_PASS -out keystore-backup.enc

          shred -u release.jks

      - name: Upload encrypted backup
        uses: actions/upload-artifact@v4
        with:
          name: keystore-backup-encrypted
          path: keystore-backup.enc
          retention-days: 30
